openapi: 3.0.0
info:
  contact:
    email: mike.ralphson@gmail.com
    name: Mike Ralphson
    url: https://github.com/mermade/aws2openapi
    x-twitter: PermittedSoc
  description: "<p>The AWS Migration Hub API methods help to obtain server and application\
    \ migration status and integrate your resource-specific migration tool by providing\
    \ a programmatic interface to Migration Hub.</p> <p>Remember that you must set\
    \ your AWS Migration Hub home region before you call any of these APIs, or a <code>HomeRegionNotSetException</code>\
    \ error will be returned. Also, you must make the API calls while in your home\
    \ region.</p>"
  license:
    name: Apache 2.0 License
    url: http://www.apache.org/licenses/
  termsOfService: https://aws.amazon.com/service-terms/
  title: AWS Migration Hub
  version: 2017-05-31
  x-release: v4
  x-logo:
    url: https://twitter.com/awscloud/profile_image?size=original
    backgroundColor: '#FFFFFF'
  x-providerName: amazonaws.com
  x-serviceName: AWSMigrationHub
  x-origin:
