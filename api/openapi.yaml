  /#X-Amz-Target=AWSMigrationHub.DisassociateCreatedArtifact:
    post:
      description: "<p>Disassociates a created artifact of an AWS resource with a\
        \ migration task performed by a migration tool that was previously associated.\
        \ This API has the following traits:</p> <ul> <li> <p>A migration user can\
